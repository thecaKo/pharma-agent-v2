# A cada merge em develop: gera o instalador MSI do agente (WiX v4 via .NET)
# e publica/atualiza a release rolling `develop-latest`, mantendo a URL de
# download estável:
#   https://github.com/thecaKo/pharma-agent-v2/releases/download/develop-latest/PharmaAgentConnector.msi
#
# Pré-requisitos do empacotador supridos aqui:
# - node.exe win x64  -> NODE_EXE_PATH (node do próprio runner windows)
# - WinSW             -> installer/staging/PharmaAgentConnector.Service.exe (versionado no repo)
# - node_modules prod -> NODE_MODULES_PATH (npm ci --omit=dev em diretório separado,
#                        para não perder as devDeps de que o build precisa)
name: develop-installer

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-installer
  cancel-in-progress: true

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Instala dependências (com devDeps, p/ build)
        run: npm ci

      - name: Confere o WinSW versionado no repo
        shell: bash
        run: |
          test -f installer/staging/PharmaAgentConnector.Service.exe || {
            echo "::error::installer/staging/PharmaAgentConnector.Service.exe ausente no repo (WinSW x64)"; exit 1; }

      - name: Prepara node_modules de produção (win x64)
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/prod"
          cp package.json package-lock.json "$RUNNER_TEMP/prod/"
          cd "$RUNNER_TEMP/prod"
          npm ci --omit=dev

      - name: Restaura extensões WiX
        run: dotnet restore installer/ConnectorPackage.wixproj

      - name: Gera o instalador (build + MSI)
        shell: bash
        env:
          NODE_MODULES_PATH: ${{ runner.temp }}\prod\node_modules
        run: |
          export NODE_EXE_PATH="$(node -e 'console.log(process.execPath)')"
          echo "node.exe: $NODE_EXE_PATH"
          npm run package:windows-installer
          ls -la installer/bin/Release/

      - name: Compacta bin/Release inteiro em PharmaAgentConnector.zip
        shell: pwsh
        run: Compress-Archive -Path installer/bin/Release/* -DestinationPath "$env:RUNNER_TEMP/PharmaAgentConnector.zip" -Force

      - name: Publica release rolling develop-latest (zip com tudo de bin/Release)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=develop-latest
          # Recria a release para o asset apontar SEMPRE para o build mais
          # novo, mantendo a mesma URL de download.
          gh release delete "$tag" --yes || true
          git push origin ":refs/tags/$tag" || true
          gh release create "$tag" "$RUNNER_TEMP/PharmaAgentConnector.zip" \
            --prerelease \
            --title "Agente — develop (build ${GITHUB_RUN_NUMBER}, ${GITHUB_SHA:0:7})" \
            --notes "Pacote de instalação do agente gerado automaticamente do último merge em \`develop\` (commit ${GITHUB_SHA}). O zip contém TODOS os arquivos de installer/bin/Release — extraia tudo na mesma pasta e execute o PharmaAgentConnector.msi. Gerado pelo workflow develop-installer."

      - name: Guarda bin/Release também como artifact do run
        uses: actions/upload-artifact@v4
        with:
          name: PharmaAgentConnector-release
          path: installer/bin/Release/
          retention-days: 14
